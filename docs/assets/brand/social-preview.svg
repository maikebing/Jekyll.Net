<svg width="1280" height="640" viewBox="0 0 1280 640" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1280" height="640" fill="#0F1B2D"/>

  <!-- Subtle grid lines -->
  <line x1="0" y1="160" x2="1280" y2="160" stroke="#1A2E4A" stroke-width="1"/>
  <line x1="0" y1="320" x2="1280" y2="320" stroke="#1A2E4A" stroke-width="1"/>
  <line x1="0" y1="480" x2="1280" y2="480" stroke="#1A2E4A" stroke-width="1"/>
  <line x1="320" y1="0" x2="320" y2="640" stroke="#1A2E4A" stroke-width="1"/>
  <line x1="640" y1="0" x2="640" y2="640" stroke="#1A2E4A" stroke-width="1"/>
  <line x1="960" y1="0" x2="960" y2="640" stroke="#1A2E4A" stroke-width="1"/>

  <!-- Top-right glow blob -->
  <ellipse cx="1100" cy="120" rx="340" ry="220" fill="url(#glowTopRight)" opacity="0.35"/>
  <!-- Bottom-left glow blob -->
  <ellipse cx="180" cy="540" rx="280" ry="180" fill="url(#glowBottomLeft)" opacity="0.25"/>

  <!-- Icon: background rect -->
  <rect x="80" y="200" width="200" height="200" rx="52" fill="url(#iconBg)"/>

  <!-- Icon: sheet back -->
  <rect x="114" y="244" width="96" height="112" rx="22" fill="url(#sheetBack)" fill-opacity="0.5"/>

  <!-- Icon: sheet front -->
  <path d="M148 228H228C249.539 228 267 245.461 267 267V333C267 354.539 249.539 372 228 372H148C126.461 372 109 354.539 109 333V267C109 245.461 126.461 228 148 228Z" fill="url(#sheetFront)"/>

  <!-- Icon: fold corner -->
  <path d="M228 228L267 267H240C234.477 267 230 262.523 230 257V228Z" fill="#D8E8FF"/>

  <!-- Icon: bookmark -->
  <path d="M133 253C133 250.239 135.239 248 138 248H183C185.761 248 188 250.239 188 253V319L160.5 337L133 319V253Z" fill="url(#bookmark)"/>

  <!-- Icon: lines -->
  <rect x="200" y="280" width="30" height="9" rx="4.5" fill="#2F69FF"/>
  <rect x="200" y="299" width="38" height="9" rx="4.5" fill="#8CB5FF"/>
  <rect x="133" y="350" width="82" height="9" rx="4.5" fill="#CFE0FF"/>

  <!-- Title -->
  <text x="320" y="280" fill="#F0F6FF" font-family="'IBM Plex Sans', 'Segoe UI', Arial, sans-serif" font-size="96" font-weight="700" letter-spacing="-2">JekyllNet</text>

  <!-- Subtitle -->
  <text x="324" y="338" fill="#6B8BAE" font-family="'IBM Plex Sans', 'Segoe UI', Arial, sans-serif" font-size="26" font-weight="600" letter-spacing="3">STATIC SITE GENERATOR FOR .NET</text>

  <!-- Divider -->
  <rect x="320" y="368" width="640" height="2" rx="1" fill="url(#divider)"/>

  <!-- Feature pills -->
  <!-- Pill 1 -->
  <rect x="320" y="400" width="172" height="40" rx="20" fill="#1A2E4A" stroke="#2D5BFF" stroke-width="1.5"/>
  <text x="406" y="426" fill="#8CB5FF" font-family="'IBM Plex Sans', 'Segoe UI', Arial, sans-serif" font-size="16" font-weight="600" text-anchor="middle">Liquid Templates</text>

  <!-- Pill 2 -->
  <rect x="504" y="400" width="148" height="40" rx="20" fill="#1A2E4A" stroke="#2D5BFF" stroke-width="1.5"/>
  <text x="578" y="426" fill="#8CB5FF" font-family="'IBM Plex Sans', 'Segoe UI', Arial, sans-serif" font-size="16" font-weight="600" text-anchor="middle">Sass / SCSS</text>

  <!-- Pill 3 -->
  <rect x="664" y="400" width="148" height="40" rx="20" fill="#1A2E4A" stroke="#2D5BFF" stroke-width="1.5"/>
  <text x="738" y="426" fill="#8CB5FF" font-family="'IBM Plex Sans', 'Segoe UI', Arial, sans-serif" font-size="16" font-weight="600" text-anchor="middle">AI Translation</text>

  <!-- Pill 4 -->
  <rect x="824" y="400" width="136" height="40" rx="20" fill="#1A2E4A" stroke="#18B4A9" stroke-width="1.5"/>
  <text x="892" y="426" fill="#5ED8D0" font-family="'IBM Plex Sans', 'Segoe UI', Arial, sans-serif" font-size="16" font-weight="600" text-anchor="middle">dotnet tool</text>

  <!-- Bottom tagline -->
  <text x="320" y="510" fill="#3A5070" font-family="'IBM Plex Sans', 'Segoe UI', Arial, sans-serif" font-size="20" font-weight="400" letter-spacing="0.5">Jekyll-compatible · GitHub Pages behavior · Built with C# &amp; .NET 10</text>

  <!-- GitHub org handle -->
  <text x="320" y="570" fill="#2D5BFF" font-family="'IBM Plex Sans', 'Segoe UI', Arial, sans-serif" font-size="18" font-weight="600" letter-spacing="0.5">github.com/JekyllNet/JekyllNet</text>

  <defs>
    <linearGradient id="iconBg" x1="80" y1="200" x2="280" y2="400" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2D5BFF"/>
      <stop offset="0.58" stop-color="#377DFF"/>
      <stop offset="1" stop-color="#18B4A9"/>
    </linearGradient>
    <linearGradient id="sheetFront" x1="109" y1="236" x2="255" y2="364" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#F4F9FF"/>
    </linearGradient>
    <linearGradient id="sheetBack" x1="114" y1="244" x2="210" y2="356" gradientUnits="userSpaceOnUse">
      <stop stop-color="#9FC5FF"/>
      <stop offset="1" stop-color="#B9FFF3"/>
    </linearGradient>
    <linearGradient id="bookmark" x1="133" y1="248" x2="188" y2="337" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FF8A49"/>
      <stop offset="1" stop-color="#F35F20"/>
    </linearGradient>
    <linearGradient id="glowTopRight" x1="760" y1="0" x2="1280" y2="340" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2D5BFF"/>
      <stop offset="1" stop-color="#18B4A9"/>
    </linearGradient>
    <linearGradient id="glowBottomLeft" x1="0" y1="360" x2="460" y2="640" gradientUnits="userSpaceOnUse">
      <stop stop-color="#377DFF"/>
      <stop offset="1" stop-color="#18B4A9"/>
    </linearGradient>
    <linearGradient id="divider" x1="320" y1="369" x2="960" y2="369" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2D5BFF"/>
      <stop offset="1" stop-color="#18B4A9" stop-opacity="0"/>
    </linearGradient>
  </defs>
</svg>
