name: release-artifacts

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Package version override, for example 0.1.1"
        required: false
        type: string
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  pack-and-publish-portable:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore ./JekyllNet.slnx

      - name: Resolve package version
        id: version
        shell: pwsh
        run: |
          $version = $null
          $releaseTag = $null

          if ('${{ github.ref_type }}' -eq 'tag') {
            $releaseTag = $env:GITHUB_REF_NAME
            $version = $releaseTag.Substring(1)
          }
          elseif (-not [string]::IsNullOrWhiteSpace('${{ github.event.inputs.version }}')) {
            $version = '${{ github.event.inputs.version }}'
            $releaseTag = "v$version"
          }
          else {
            [xml]$project = Get-Content ./JekyllNet.Cli/JekyllNet.Cli.csproj
            $version = $project.Project.PropertyGroup.Version | Select-Object -First 1
            if ([string]::IsNullOrWhiteSpace($version)) {
              throw "Could not resolve a package version from the workflow input or JekyllNet.Cli.csproj."
            }

            $releaseTag = "v$version"
          }

          if ($version -notmatch '^[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.-]+)?$') {
            throw "Package version '$version' is not a valid SemVer-style release version. Use tags such as v0.1.0."
          }

          "package_version=$version" >> $env:GITHUB_OUTPUT
          "release_tag=$releaseTag" >> $env:GITHUB_OUTPUT

      - name: Test
        run: dotnet test ./JekyllNet.slnx --configuration Release --no-restore

      - name: Pack dotnet tool
        shell: pwsh
        run: |
          $args = @(
            'pack',
            './JekyllNet.Cli/JekyllNet.Cli.csproj',
            '--configuration', 'Release',
            '--no-restore',
            '--output', './artifacts/nupkg',
            "-p:Version=${{ steps.version.outputs.package_version }}"
          )

          dotnet @args

      - name: Publish Windows portable build
        shell: pwsh
        run: |
          $args = @(
            'publish',
            './JekyllNet.Cli/JekyllNet.Cli.csproj',
            '--configuration', 'Release',
            '--no-restore',
            '--runtime', 'win-x64',
            '--self-contained', 'true',
            '-p:PublishSingleFile=true',
            "-p:Version=${{ steps.version.outputs.package_version }}",
            '-o', './artifacts/publish/win-x64'
          )

          dotnet @args

      - name: Archive Windows portable build
        shell: pwsh
        run: Compress-Archive -Path ./artifacts/publish/win-x64/* -DestinationPath ./artifacts/JekyllNet-win-x64.zip

      - name: Generate release checksums
        id: checksums
        shell: pwsh
        run: |
          $zipHash = (Get-FileHash ./artifacts/JekyllNet-win-x64.zip -Algorithm SHA256).Hash.ToUpperInvariant()
          "$zipHash  JekyllNet-win-x64.zip" | Set-Content ./artifacts/SHA256SUMS.txt -Encoding utf8
          "windows_x64_zip_sha256=$zipHash" >> $env:GITHUB_OUTPUT

      - name: Generate winget manifests
        id: winget
        shell: pwsh
        run: |
          ./scripts/Export-WingetManifest.ps1 `
            -Version '${{ steps.version.outputs.package_version }}' `
            -InstallerUrl 'https://github.com/${{ github.repository }}/releases/download/${{ steps.version.outputs.release_tag }}/JekyllNet-win-x64.zip' `
            -ZipPath './artifacts/JekyllNet-win-x64.zip' `
            -OutputDirectory './artifacts/winget'

          $manifestDirectory = Resolve-Path "./artifacts/winget/JekyllNet.JekyllNet/${{ steps.version.outputs.package_version }}"
          "manifest_directory=$($manifestDirectory.Path)" >> $env:GITHUB_OUTPUT

      - name: Publish GitHub Release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.release_tag }}
          name: JekyllNet ${{ steps.version.outputs.package_version }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            ./artifacts/JekyllNet-win-x64.zip
            ./artifacts/SHA256SUMS.txt
            ./artifacts/nupkg/*.nupkg
            ./artifacts/winget/JekyllNet.JekyllNet/${{ steps.version.outputs.package_version }}/*.yaml

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts-${{ steps.version.outputs.package_version }}
          if-no-files-found: error
          path: |
            ./artifacts/nupkg
            ./artifacts/JekyllNet-win-x64.zip
            ./artifacts/SHA256SUMS.txt
            ./artifacts/winget
