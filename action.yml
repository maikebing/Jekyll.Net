name: JekyllNet Build
description: Build a Jekyll-style static site with JekyllNet and optionally upload the generated output as a workflow artifact.
author: JekyllNet

inputs:
  source:
    description: Site source directory, relative to the workflow workspace unless an absolute path is provided.
    required: false
    default: .
  destination:
    description: Build output directory, relative to the workflow workspace unless an absolute path is provided.
    required: false
    default: _site
  drafts:
    description: Include content from _drafts.
    required: false
    default: "false"
  future:
    description: Include content dated in the future.
    required: false
    default: "false"
  unpublished:
    description: Include content with published false.
    required: false
    default: "false"
  posts-per-page:
    description: Override pagination page size.
    required: false
    default: ""
  dotnet-version:
    description: .NET SDK version to install when setup-dotnet is enabled.
    required: false
    default: 10.0.x
  dotnet-configuration:
    description: Build configuration used when invoking dotnet run for the JekyllNet CLI project.
    required: false
    default: Release
  setup-dotnet:
    description: Install the configured .NET SDK before running JekyllNet.
    required: false
    default: "true"
  upload-artifact:
    description: Upload the generated destination directory as a workflow artifact.
    required: false
    default: "false"
  artifact-name:
    description: Artifact name used when upload-artifact is enabled.
    required: false
    default: jekyllnet-site

outputs:
  destination:
    description: Absolute path to the generated site output.
    value: ${{ steps.build.outputs.destination }}

runs:
  using: composite
  steps:
    - name: Setup .NET
      if: ${{ inputs.setup-dotnet == 'true' }}
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ inputs.dotnet-version }}

    - name: Build site
      id: build
      shell: bash
      run: |
        args=(
          run
          --project "${{ github.action_path }}/JekyllNet.Cli/JekyllNet.Cli.csproj"
          --configuration "${{ inputs.dotnet-configuration }}"
          --
          build
          --source "${{ inputs.source }}"
          --destination "${{ inputs.destination }}"
          --drafts "${{ inputs.drafts }}"
          --future "${{ inputs.future }}"
          --unpublished "${{ inputs.unpublished }}"
          --github-output-destination
        )

        if [ -n "${{ inputs.posts-per-page }}" ]; then
          args+=(--posts-per-page "${{ inputs.posts-per-page }}")
        fi

        dotnet "${args[@]}"

    - name: Upload site artifact
      if: ${{ inputs.upload-artifact == 'true' }}
      uses: actions/upload-artifact@v4
      with:
        name: ${{ inputs.artifact-name }}
        path: ${{ steps.build.outputs.destination }}
